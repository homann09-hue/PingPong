name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  node:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: aurora_test
          POSTGRES_USER: aurora
          POSTGRES_PASSWORD: test-only-password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aurora -d aurora_test"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    env:
      TEST_DATABASE_URL: postgres://aurora:test-only-password@localhost:5432/aurora_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
  flutter:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/mobile } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: 3.44.6, channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
      - run: flutter build web --release --no-web-resources-cdn --no-pub
      - run: flutter build apk --debug --no-pub
  ios:
    runs-on: macos-latest
    defaults: { run: { working-directory: apps/mobile } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: 3.44.6, channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter build ios --simulator --debug --no-codesign --no-pub
