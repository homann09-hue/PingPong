name: ci
permissions:
  contents: write
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request:
  push:
    branches: [main]
jobs:
  node:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: aurora_test
          POSTGRES_USER: aurora
          POSTGRES_PASSWORD: test-only-password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aurora -d aurora_test"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    env:
      TEST_DATABASE_URL: postgres://aurora:test-only-password@localhost:5432/aurora_test
    steps:
      - uses: actions/checkout@v4
      - name: Apply progression integration patch
        if: github.event_name == 'pull_request' && github.head_ref == 'codex/core-systems-integration'
        shell: bash
        run: |
          cat scripts/progression-integration.patch.part* > /tmp/progression-integration.patch
          if git apply --check /tmp/progression-integration.patch; then
            git apply /tmp/progression-integration.patch
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apps/api/src/meta apps/api/src/spins infra/postgres
            git commit -m "feat(api): integrate deterministic player progression"
            git push origin HEAD:${GITHUB_HEAD_REF}
          else
            test -f apps/api/src/meta/spin-progression.ts
            test -f infra/postgres/035_player_progression_curve_v1.sql
            grep -q 'advanceSpinProgression' apps/api/src/spins/in-memory-spin-store.ts
            grep -q 'advanceSpinProgression' apps/api/src/spins/postgres-spin-store.ts
            echo "Progression integration is already applied."
          fi
      - name: Upload integration source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: core-systems-source-${{ github.sha }}
          retention-days: 1
          path: |
            apps/api/src/spins
            apps/api/src/meta/player-progression.ts
            apps/api/src/economy/xp-booster.ts
            apps/api/package.json
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run build -w @aurora/player-web
  flutter:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/mobile } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: 3.44.6, channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
      - run: flutter build web --release --no-web-resources-cdn --no-pub
      - run: flutter build apk --debug --no-pub
  ios:
    runs-on: macos-latest
    defaults: { run: { working-directory: apps/mobile } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: 3.44.6, channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter build ios --simulator --debug --no-codesign --no-pub
