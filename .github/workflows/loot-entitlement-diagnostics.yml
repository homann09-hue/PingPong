name: loot entitlement diagnostics
on:
  pull_request:
permissions:
  contents: read
jobs:
  diagnose:
    if: github.head_ref == 'codex/loot-entitlements'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: aurora_test
          POSTGRES_USER: aurora
          POSTGRES_PASSWORD: test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aurora -d aurora_test"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    env:
      TEST_DATABASE_URL: postgresql://aurora:test-only-password@localhost:5432/aurora_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run focused entitlement suite
        shell: bash
        run: |
          set -o pipefail
          npm exec vitest run apps/api/src/loot/loot-entitlement.test.ts apps/api/src/loot/loot-opening.test.ts apps/api/src/loot/postgres-loot-store.integration.test.ts 2>&1 | tee loot-entitlement-test-report.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loot-entitlement-test-report-${{ github.sha }}
          path: loot-entitlement-test-report.txt
          retention-days: 1
