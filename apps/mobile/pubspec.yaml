name: aurora_mobile
description: Server-authoritative Aurora social casino client.
publish_to: none
version: 0.1.0+1
environment:
  sdk: ">=3.8.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  in_app_purchase: ^3.3.0
  flutter_secure_storage: ^10.3.1
  # Pinned together so Firebase native integrations upgrade intentionally.
  firebase_core: 4.11.0
  firebase_messaging: 16.4.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  fonts:
    - family: AuroraSans
      fonts:
        - asset: assets/fonts/AuroraSans-Regular.ttf
    # Flutter Web uses Roboto as its final Material fallback. Map that family
    # to the bundled brand font so the client never depends on Google Fonts.
    - family: Roboto
      fonts:
        - asset: assets/fonts/AuroraSans-Regular.ttf
  assets:
    - assets/world/
    - assets/slots/
    - assets/symbols/pharaoh/
    - assets/symbols/dragon/
    - assets/symbols/candy/
    - assets/symbols/pirate/
    - assets/symbols/neon/
    - assets/symbols/frozen/
    - assets/symbols/jungle/
    - assets/symbols/vegas/
    - assets/ui/
