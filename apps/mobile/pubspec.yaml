name: aurora_mobile
description: Server-authoritative Aurora social casino client.
publish_to: none
version: 0.1.0+1
environment:
  sdk: ">=3.8.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  fonts:
    - family: AuroraSans
      fonts:
        - asset: assets/fonts/AuroraSans-Regular.ttf
  assets:
    - assets/world/
    - assets/slots/
    - assets/symbols/pharaoh/
    - assets/symbols/dragon/
    - assets/symbols/candy/
    - assets/symbols/pirate/
    - assets/symbols/neon/
    - assets/symbols/frozen/
    - assets/symbols/jungle/
    - assets/symbols/vegas/
    - assets/ui/
