services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aurora
      POSTGRES_USER: aurora
      POSTGRES_PASSWORD: local-only-password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora -d aurora"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - aurora-postgres:/var/lib/postgresql/data
volumes:
  aurora-postgres:
